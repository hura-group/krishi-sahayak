# ─────────────────────────────────────────────────────────────────────────────
# KrishiSahayak — Scheduled Maintenance Jobs
#
# Runs automatically on a schedule — no manual trigger needed.
#
# Jobs:
#   1. dependency-updates — Weekly check for outdated packages (Monday 9 AM IST)
#   2. stale-issues       — Label stale issues/PRs after 14 days of inactivity
# ─────────────────────────────────────────────────────────────────────────────

name: Scheduled Maintenance

on:
  schedule:
    # Every Monday at 3:30 AM UTC = 9:00 AM IST
    - cron: '30 3 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ── Weekly dependency update check ────────────────────────────────────────
  dependency-check:
    name: 📦 Check Outdated Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated packages
        id: outdated
        run: |
          pnpm outdated --format json > /tmp/outdated.json 2>/dev/null || true
          COUNT=$(cat /tmp/outdated.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT outdated packages"

      - name: Create issue if outdated packages found
        if: steps.outdated.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies',
              state: 'open',
            });

            const alreadyExists = issues.some(i =>
              i.title.includes('Weekly Dependency Update Check')
            );

            if (!alreadyExists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📦 Weekly Dependency Update Check',
                body: [
                  '## Outdated Dependencies Detected',
                  '',
                  `Found **${{ steps.outdated.outputs.count }}** outdated packages.`,
                  '',
                  'Run the following to see details:',
                  '```bash',
                  'pnpm outdated',
                  '```',
                  '',
                  'To update a specific package:',
                  '```bash',
                  'pnpm update <package-name>',
                  '```',
                  '',
                  '> Auto-generated by scheduled workflow · Assign to Umang (B)',
                ].join('\n'),
                labels: ['dependencies', 'chore'],
                assignees: [],
              });
            }

  # ── Stale issue management ─────────────────────────────────────────────────
  stale:
    name: 🕒 Mark Stale Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Issues inactive for 14 days get the stale label
          stale-issue-message: >
            👋 This issue has been inactive for 14 days.
            If it is still relevant, please comment or remove the `stale` label.
            It will be closed in 7 more days if there is no activity.
          # PRs inactive for 7 days get the stale label
          stale-pr-message: >
            👋 This PR has been inactive for 7 days.
            If it is still being worked on, please push an update or comment.
            It will be closed in 7 more days if there is no activity.
          close-issue-message: >
            🔒 Closing due to inactivity. Re-open if this is still needed.
          close-pr-message: >
            🔒 Closing due to inactivity. Re-open if this is still being worked on.
          days-before-stale: 14
          days-before-close: 7
          days-before-pr-stale: 7
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
          exempt-all-milestones: true
