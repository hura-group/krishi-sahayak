# ─────────────────────────────────────────────────────────────────────────────
# KrishiSahayak — Continuous Integration Pipeline
#
# Runs on every push to main and every pull request targeting main.
# All 4 jobs must pass before a PR can be merged (enforced by branch protection).
#
# Jobs:
#   1. lint       — ESLint on all TypeScript/JavaScript files
#   2. typecheck  — TypeScript compiler check (strict mode, zero errors)
#   3. test       — Jest unit tests with coverage report
#   4. security   — Dependency audit for known vulnerabilities
#
# Owner: Umang (B) — Backend · DevOps · APIs
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Lint · TypeCheck · Test · Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel any in-progress run for the same branch when a new commit is pushed
# This saves CI minutes and avoids queuing stale runs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── JOB 1: ESLint ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for some lint rules

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        env:
          # Treat warnings as errors in CI — no warnings allowed on main
          ESLINT_MAX_WARNINGS: 0

      - name: Upload ESLint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 7

  # ── JOB 2: TypeScript ──────────────────────────────────────────────────────
  typecheck:
    name: 📘 TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ── JOB 3: Jest Unit Tests ─────────────────────────────────────────────────
  test:
    name: 🧪 Jest Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage
        env:
          CI: true
          # Suppress Expo/React Native warnings in CI output
          EXPO_NO_DOTENV: 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail — useful for debugging
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary comment on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true  # Don't fail CI if comment posting fails
        with:
          json-summary-path: coverage/coverage-summary.json

  # ── JOB 4: Security Audit ──────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency security audit
        # --audit-level=high: fail only on HIGH or CRITICAL vulnerabilities
        # moderate/low are flagged but don't block the PR
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true  # Advisory only — secrets check is best-effort

  # ── Status check: all jobs must pass ──────────────────────────────────────
  # This single job is what branch protection checks.
  # Simpler than listing 4 separate required status checks.
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}"      != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}"      != "success" ]] || \
             [[ "${{ needs.security.result }}"  != "success" ]]; then
            echo "❌ One or more CI jobs failed:"
            echo "  lint:      ${{ needs.lint.result }}"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  test:      ${{ needs.test.result }}"
            echo "  security:  ${{ needs.security.result }}"
            exit 1
          fi
          echo "✅ All CI jobs passed — PR is ready to merge"
